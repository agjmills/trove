version: "2"

linters:
  # In this version, global control is moved to the 'presets' key
  presets:
    - none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: ["github.com/agjmills/trove"]
