{{define "content"}}
{{template "flash_messages" .}}
<div class="max-w-md mx-auto mt-8 bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md">
	<h1 class="text-3xl font-bold mb-6 text-gray-900 dark:text-gray-100">Login</h1>
	<form method="POST" action="/login">
		<div class="mb-4">
			<label for="username" class="block mb-2 font-medium text-gray-900 dark:text-gray-100">Username</label>
			<input type="text" id="username" name="username" required autofocus 
				class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:border-gray-900 dark:focus:border-gray-400">
		</div>
		<div class="mb-4">
			<label for="password" class="block mb-2 font-medium text-gray-900 dark:text-gray-100">Password</label>
			<input type="password" id="password" name="password" required 
				class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:border-gray-900 dark:focus:border-gray-400">
		</div>
		<button type="submit" class="w-full bg-gray-900 dark:bg-gray-600 text-white py-3 rounded mt-4 hover:bg-gray-700 dark:hover:bg-gray-500">Login</button>
	</form>
	{{if .EnableRegistration}}
	<p class="mt-4 text-center text-gray-900 dark:text-gray-100">Don't have an account? <a href="/register" class="text-gray-900 dark:text-gray-100 hover:underline">Register</a></p>
	{{end}}
	{{if .OIDCEnabled}}
	<div class="mt-6">
		<div class="relative flex items-center">
			<div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
			<span class="mx-3 text-sm text-gray-500 dark:text-gray-400">or</span>
			<div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
		</div>
		<a href="/auth/oidc/login" class="mt-4 w-full flex justify-center items-center gap-2 bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100 py-3 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors font-medium">
			<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
				<circle cx="12" cy="12" r="10"></circle>
				<line x1="2" y1="12" x2="22" y2="12"></line>
				<path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
			</svg>
			Login with SSO
		</a>
	</div>
	{{end}}
</div>
{{end}}
