name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: storage_backend
    attributes:
      label: Storage backend
      options:
        - disk
        - s3
        - other
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - sqlite
        - postgres
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Trove version
      placeholder: "e.g. v1.2.0 or latest"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output here.
      render: shell
