version: "2"

linters:
  # Swapping 'disable-all' for the explicit 'enable' list strategy
  disable-all-presets: true 
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # FIX: Must be a list [ ... ]
      local-prefixes: ["github.com/agjmills/trove"]

# Removed 'run: version: "2"' entirely as the Action says it's not allowed
