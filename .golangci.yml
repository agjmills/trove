version: "2"

linters:
  # In some v2 sub-versions, disable-all is the only accepted key here
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Ensure this remains an array/list
      local-prefixes: ["github.com/agjmills/trove"]

# We are leaving 'run:' and 'linters-settings:' out entirely to 
# avoid any "additional properties" errors.